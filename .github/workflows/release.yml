name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
          - goos: windows
            goarch: arm64
            runner: windows-latest
            ext: .exe
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ""
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
      - name: Build agent
        shell: bash
        run: |
          cd protector/cmd/agent
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          OUT="consent-agent-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -o "$OUT"
          mv "$OUT" "$GITHUB_WORKSPACE/"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            consent-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

