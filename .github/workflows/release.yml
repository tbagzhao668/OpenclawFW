name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
          - goos: windows
            goarch: arm64
            runner: windows-latest
            ext: .exe
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ""
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
          cache: true
      - name: Set up Go env
        run: |
          echo "GOPROXY=https://proxy.golang.org,direct" >> $GITHUB_ENV
          echo "CGO_ENABLED=0" >> $GITHUB_ENV
      - name: Build agent
        shell: bash
        run: |
          cd protector/cmd/agent
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          OUT="consent-agent-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$OUT"
          mv "$OUT" "$GITHUB_WORKSPACE/"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: consent-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: consent-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List files
        run: ls -al dist
      - name: Create/Update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

